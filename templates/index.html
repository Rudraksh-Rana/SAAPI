<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis API</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --positive: #10b981;
            --negative: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            margin-top: 2rem;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            display: none;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .label {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .label.positive { color: var(--positive); }
        .label.negative { color: var(--negative); }

        .score-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .score-bar-bg {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .error-message {
            color: var(--negative);
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sentiment API</h1>
        <p class="subtitle">Powered by Flask & DistilBERT</p>

        <div class="input-group">
            <textarea id="textInput" placeholder="Type a sentence here to analyze its sentiment... (e.g., 'This feature works flawlessly!')"></textarea>
            <div id="errorMsg" class="error-message"></div>
        </div>

        <button id="analyzeBtn">
            <span id="btnText">Analyze Sentiment</span>
            <div id="btnSpinner" class="spinner"></div>
        </button>

        <div id="resultCard" class="result-card">
            <div class="result-header">
                <span id="resultLabel" class="label"></span>
                <div class="score-container">
                    <div class="score-bar-bg">
                        <div id="scoreBar" class="score-bar-fill"></div>
                    </div>
                    <span id="scoreText" class="score-text"></span>
                </div>
            </div>
            <p id="analyzedText" style="color: var(--text-secondary); font-size: 0.9rem; font-style: italic;"></p>
        </div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const textInput = document.getElementById('textInput').value.trim();
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultCard = document.getElementById('resultCard');
            const errorMsg = document.getElementById('errorMsg');

            // Reset states
            errorMsg.style.display = 'none';
            resultCard.style.display = 'none';

            if (!textInput) {
                errorMsg.textContent = 'Please enter some text to analyze.';
                errorMsg.style.display = 'block';
                return;
            }

            // Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to analyze text');
                }

                // Show results
                document.getElementById('resultLabel').textContent = data.label;
                document.getElementById('resultLabel').className = `label ${data.label.toLowerCase()}`;
                
                const percentage = (data.score * 100).toFixed(1);
                document.getElementById('scoreText').textContent = `${percentage}% Confidence`;
                
                const scoreBar = document.getElementById('scoreBar');
                scoreBar.style.width = '0%'; // Reset for animation
                scoreBar.style.backgroundColor = data.label === 'POSITIVE' ? 'var(--positive)' : 'var(--negative)';
                
                setTimeout(() => {
                    scoreBar.style.width = `${percentage}%`;
                }, 50);

                document.getElementById('analyzedText').textContent = `"${data.text}"`;
                resultCard.style.display = 'block';

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                // Remove loading state
                btn.disabled = false;
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
            }
        });
        
        // Allow Enter key to submit (Shift+Enter for new line)
        document.getElementById('textInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('analyzeBtn').click();
            }
        });
    </script>
</body>
</html>
